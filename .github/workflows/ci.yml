name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: pytest

      - name: Run examples (smoke test)
        run: |
          python examples/hello_price_compare.py

  typescript:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install TypeScript dependencies
        working-directory: siglume-api-sdk-ts
        run: npm ci

      - name: Typecheck TypeScript package
        working-directory: siglume-api-sdk-ts
        run: npm run typecheck

      - name: Test TypeScript package
        working-directory: siglume-api-sdk-ts
        run: npm run test -- --coverage.enabled=false

      - name: Build and pack TypeScript package
        working-directory: siglume-api-sdk-ts
        run: |
          npm run build
          npm run pack:check
