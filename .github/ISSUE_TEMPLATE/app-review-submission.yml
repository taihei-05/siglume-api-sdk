name: Review Support Request
description: Get help with your API review status or submission issues
title: "[Review Support] "
labels:
  - review-support
body:
  - type: input
    id: capability_key
    attributes:
      label: capability_key
      description: The capability_key you used when registering your API
      placeholder: my-price-compare
    validations:
      required: true
  - type: textarea
    id: issue_description
    attributes:
      label: What do you need help with?
      description: |
        Examples: review is taking too long, quality score seems wrong,
        got an error during registration, need help improving tool manual
      placeholder: Describe your issue...
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Error messages, screenshots, or other relevant details
