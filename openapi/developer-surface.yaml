    AppListingRequest:
      type: object
      required: [capability_key, name, category, price_model, jurisdiction]
      description: |
        Listing request for the developer surface.

        Listing request for the Siglume developer surface.
        Free, subscription, usage_based, and per_action models are live.
        Use `price_model=free` for free APIs, `subscription` for recurring paid APIs,
        or `usage_based` / `per_action` for free upfront invocation with post-execution
        billing declared by the API result. Paid models require a Polygon payout wallet.
      properties:
        capability_key: { type: string, minLength: 1, maxLength: 128 }
        name: { type: string, minLength: 1, maxLength: 255 }
        description:
          type: string
          maxLength: 1000
          description: |
            Long-form buyer-facing sales copy shown on the API detail page.
            Complements `short_description` (one-liner) with the full pitch:
            who this is for, what it can / cannot do, limits, required
            connected accounts, quotas. Plain text. The Tool Manual is
            agent-facing at runtime and is not shown to buyers — put buyer
            copy here.
        job_to_be_done: { type: string, maxLength: 240 }
        short_description: { type: string, maxLength: 60 }
        category: { type: string, enum: [commerce, booking, crm, finance, document, communication, monitoring, creative, productivity, summarization, other] }
        permission_class: { type: string, enum: [read-only, action, payment, recommendation], description: "Supported tiers: read-only / action / payment. `recommendation` is a deprecated alias of read-only kept for backward compatibility; do not use in new manifests." }
        approval_mode: { type: string, enum: [auto, budget-bounded, always-ask, deny] }
        dry_run_supported: { type: boolean, default: false }
        required_connected_accounts:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
        permission_scopes: { type: array, items: { type: string } }
        price_model:
          type: string
          enum: [free, subscription, per_request, usage_based, per_action]
          description: Pricing model. `usage_based` and `per_action` price operations from pricing_plan. With billing_timing=post they settle after the execution receipt; with billing_timing=prepay they require a quote and direct payment before ACTION execution.
        price_value_minor:
          type: integer
          minimum: 0
          description: Fixed price in minor currency units. Use 0 for free and for post-execution models where each execution declares its own amount.
        pricing_plan:
          $ref: '#/components/schemas/PricingPlan'
        billing_timing:
          type: string
          enum: [post, prepay]
          default: post
          description: Billing timing for usage_based/per_action. Use prepay for irreversible side effects.
        currency: { type: string, default: USD }
        docs_url: { type: string, description: "Public API usage guide; not a generic seller homepage." }
        support_contact: { type: string, description: "Real support email address or public support URL." }
        seller_homepage_url: { type: string, description: "Optional official seller homepage, separate from docs_url." }
        seller_social_url: { type: string, description: "Optional official seller social/profile URL, separate from docs_url." }
        publisher_type: { type: string, enum: [user, company], description: "Publishing subject. Use company with company_id for company-name listings." }
        company_id: { type: string, description: "Siglume company id when publisher_type is company." }
        publisher_company_id: { type: string, description: "Alias for company_id." }
        store_vertical: { type: string, enum: [api, game], description: "Store surface: api for API Store or game for Game API Store." }
        jurisdiction: { type: string, description: Governing ISO 3166-1 alpha-2 country code for the API }
        input_shape_summary: { type: string }
        output_shape_summary: { type: string }
        compatibility_tags: { type: array, items: { type: string } }
        example_prompts:
          type: array
          items: { type: string }
          minItems: 2
          description: |
            At least 2 distinct non-empty sample prompts are required on
            auto-register and confirm. Buyers see these on the API detail
            page so they can judge how the API is meant to be used.
        latency_tier: { type: string }
        data_sensitivity_tier: { type: string }
        usage_limit_hint: { type: object }
        supported_categories: { type: array, items: { type: string } }
        disclosure: { type: object }
        public_safe_status: { type: string }
        evidence: { type: object }
        metadata: { type: object }
        execution_policy: { type: object }
        policy_acceptance: { type: boolean, default: false }
        mock_result: { type: object }
        merchant_ref: { type: string }
        disclosure_label: { type: string }
        fulfillment_kind: { type: string }
        result_summary: { type: string }
        receipt_summary: { type: string }
        sandbox_support: { type: string }
        status: { type: string }
        visibility: { type: string }

