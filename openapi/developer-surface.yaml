    ToolManual:
      type: object
      additionalProperties: false
      description: |
        Machine-readable contract describing when and how an LLM should invoke
        an agent API. Canonical schema: schemas/tool-manual.schema.json.
      required:
        - tool_name
        - job_to_be_done
        - summary_for_model
        - trigger_conditions
        - do_not_use_when
        - permission_class
        - dry_run_supported
        - requires_connected_accounts
        - input_schema
        - output_schema
        - usage_hints
        - result_hints
        - error_hints
      properties:
        tool_name:
          type: string
          pattern: "^[A-Za-z0-9_]{3,64}$"
          description: Stable tool identifier (3-64 chars, alphanumeric + underscore)
        job_to_be_done:
          type: string
          minLength: 10
          maxLength: 240
        summary_for_model:
          type: string
          minLength: 10
          maxLength: 300
          description: Concise, factual summary for LLM tool selection
        trigger_conditions:
          type: array
          minItems: 3
          maxItems: 8
          items: { type: string, minLength: 10, maxLength: 200 }
          description: Situations where this tool should be used
        do_not_use_when:
          type: array
          minItems: 1
          maxItems: 5
          items: { type: string }
        permission_class:
          type: string
          enum: [read_only, action, payment]
          description: "Permission tier (underscore form, NOT the hyphenated AppManifest form)"
        dry_run_supported: { type: boolean }
        requires_connected_accounts:
          type: array
          items: { type: string }
        input_schema:
          type: object
          description: "JSON Schema (type=object, additionalProperties=false). No platform-injected fields."
        output_schema:
          type: object
          description: "JSON Schema. Must include 'summary' property and at least one required key."
        usage_hints: { type: array, items: { type: string } }
        result_hints: { type: array, items: { type: string } }
        error_hints: { type: array, items: { type: string } }
        # Conditional: required for action / payment
        approval_summary_template: { type: string, minLength: 1 }
        preview_schema: { type: object }
        idempotency_support: { type: boolean, description: "Must be true for action/payment" }
        side_effect_summary: { type: string, minLength: 1 }
        # Conditional: required for payment only
        quote_schema: { type: object }
        currency: { type: string, enum: [USD], description: "Must be USD" }
        settlement_mode: { type: string, enum: [stripe_checkout, stripe_payment_intent, polygon_mandate, embedded_wallet_charge] }
        refund_or_cancellation_note: { type: string, minLength: 1 }

    BilingualText:
      type: object
      description: Stored bilingual ja/en text for input_form_spec titles, labels, descriptions, placeholders, and option labels.
      required: [ja, en]
      additionalProperties: false
      properties:
        ja: { type: string, minLength: 1 }
        en: { type: string, minLength: 1 }

    LocalizedText:
      oneOf:
        - type: string
          minLength: 1
        - $ref: '#/components/schemas/BilingualText'
      description: Plain seller-authored strings are accepted during auto-register and normalized by the platform into stored ja/en text.

    InputFormSpecField:
      type: object
      description: |
        A single form field. Validator-enforced rules (cannot be expressed
        purely in OpenAPI):
        - At least one field in `fields[]` must have `required: true`.
        - Field `key` must be unique within `fields[]`.
        - For `text` / `textarea` / `url` fields, `placeholder` is required
          under multi-capability composition.
        - For `select` / `multiselect`, `options` is required.
        See docs/input-form-spec.md for the full rule set.
      required: [key, type, label]
      properties:
        key:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
          description: Lowercase + underscores only. Unique within fields[].
        type:
          type: string
          enum: [text, textarea, number, select, multiselect, file, url, date, boolean]
        label: { $ref: '#/components/schemas/LocalizedText' }
        description: { $ref: '#/components/schemas/LocalizedText' }
        placeholder: { $ref: '#/components/schemas/LocalizedText' }
        required: { type: boolean, default: false }
        default:
          description: Optional default value. Type must match the field's input type.
        # text / textarea
        max_length: { type: integer, minimum: 1 }
        rows: { type: integer, minimum: 1, description: "textarea only — UI hint" }
        # number
        min: { type: number }
        max: { type: number }
        step: { type: number, exclusiveMinimum: 0 }
        unit: { type: string, description: "number only — informational, not validated" }
        # select / multiselect
        options:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [value, label]
            additionalProperties: false
            properties:
              value: { type: string, minLength: 1 }
              label: { $ref: '#/components/schemas/LocalizedText' }
        max_selections: { type: integer, minimum: 1, description: "multiselect only" }
        # file
        accept:
          type: array
          description: "file only — array of dot-prefixed extensions (e.g. '.pdf')"
          items: { type: string, pattern: "^\\." }
        max_size_mb: { type: number, exclusiveMinimum: 0, maximum: 200 }
        max_files: { type: integer, minimum: 1, default: 1 }
        # date
        min_date: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        max_date: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        # multi-capability composition
        tool_bindings:
          type: array
          description: Multi-capability composition only. Maps this form field to one or more (capability_release_id, param) pairs.
          items:
            type: object
            required: [capability_release_id, param]
            additionalProperties: false
            properties:
              capability_release_id: { type: string }
              param: { type: string }

    InputFormSpec:
      type: object
      description: |
        Optional client-facing form spec. Sellers may send plain one-language
        strings; auto-register normalizes them into stored ja/en text. The
        agent or buyer fills in this form to invoke the listing. Distinct from
        `input_schema`, which the runtime uses to validate the actual
        tool-call parameters. Canonical machine-checkable schema:
        schemas/input-form-spec.schema.json. Authoring guide:
        docs/input-form-spec.md.
      required: [version, title, fields]
      additionalProperties: false
      properties:
        version:
          type: string
          enum: ["1.0"]
          description: Spec version. Currently only '1.0' is accepted.
        title: { $ref: '#/components/schemas/LocalizedText' }
        description: { $ref: '#/components/schemas/LocalizedText' }
        fields:
          type: array
          minItems: 1
          maxItems: 20
          items: { $ref: '#/components/schemas/InputFormSpecField' }
        sections:
          type: array
          description: Optional grouping of field keys into ordered, titled UI sections.
          items:
            type: object
            required: [key, title, field_keys]
            additionalProperties: false
            properties:
              key: { type: string, pattern: "^[a-z][a-z0-9_]*$" }
              title: { $ref: '#/components/schemas/LocalizedText' }
              field_keys:
                type: array
                items: { type: string, pattern: "^[a-z][a-z0-9_]*$" }

